version: 0.1
runson: linux
autosplit: true
concurrency: 4

env:
  LT_USERNAME: ${LT_USERNAME}
  LT_ACCESS_KEY: ${LT_ACCESS_KEY}
  TARGET_URL: https://ecommerce-playground.lambdatest.io/

runtime:
  language: python
  version: "3.11"

cacheKey: "{{ checksum \"requirements.txt\" }}"
cacheDirectories:
  - .pip_cache

pre:
  - npm install -g @testmuai/kane-cli
  - pip install --cache-dir .pip_cache -r requirements.txt

testDiscovery:
  type: raw
  mode: dynamic
  command: cat reports/pytest_selection.txt

testRunnerCommand: PYTHONPATH=. pytest "$test" -v --tb=short -s

mergeArtifacts: true
uploadArtefacts:
  - name: kane-test-reports
    path:
      - reports/

retryOnFailure: true
maxRetries: 1

report: true

post:
  - echo "Tests complete"

globalTimeout: 90
testSuiteTimeout: 75

jobLabel:
  - ecommerce-products
  - agentic-sdlc
  - kane-ai
