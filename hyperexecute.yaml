version: 0.1
runson: linux
autosplit: true
concurrency: 4

env:
  LT_USERNAME: ${LT_USERNAME}
  LT_ACCESS_KEY: ${LT_ACCESS_KEY}
  TARGET_URL: https://ecommerce-playground.lambdatest.io/

runtime:
  language: python
  version: "3.11"

cacheKey: "{{ checksum \"requirements.txt\" }}"
cacheDirectories:
  - .pip_cache

pre:
  - pip install --cache-dir .pip_cache -r requirements.txt

testDiscovery:
  type: raw
  mode: dynamic
  command: cat reports/pytest_selection.txt

testRunnerCommand: pytest tests/selenium/test_products.py::$test -v --tb=short --html=reports/$test.html --self-contained-html

mergeArtifacts: true
uploadArtefacts:
  - name: selenium-test-reports
    path:
      - reports/

retryOnFailure: true
maxRetries: 2

report: true

post:
  - echo "Tests complete"

globalTimeout: 60
testSuiteTimeout: 45

jobLabel:
  - ecommerce-products
  - agentic-sdlc
  - selenium-python

captureScreenRecordingForScenarios: true
