version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: linux

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 5

env:
  LT_USERNAME: ${LT_USERNAME}
  LT_ACCESS_KEY: ${LT_ACCESS_KEY}
  GITHUB_RUN_NUMBER: ${GITHUB_RUN_NUMBER}

cacheKey: '{{ checksum "requirements.txt" }}'
cacheDirectories:
  - .pip_cache

pre:
  - pip install --cache-dir .pip_cache -r requirements.txt

runtime:
  language: python
  version: "3.11"

testDiscovery:
  type: raw
  mode: dynamic
  command: cat reports/pytest_selection.txt

testRunnerCommand: PYTHONPATH=. pytest "$test" -v --tb=short -s --html=reports/report.html --junitxml=reports/junit.xml

mergeArtifacts: true
uploadArtefacts:
  - name: TestReports
    path:
      - reports/

report: true
partialReports:
  type: json
  location: reports/
  frameworkName: extent

post:
  - echo "Tests complete"

jobLabel:
  - ecommerce-products
  - agentic-stlc
  - selenium
