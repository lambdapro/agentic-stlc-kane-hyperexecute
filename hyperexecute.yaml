version: 0.1
runson: linux
autosplit: true
concurrency: 4

env:
  LT_USERNAME: ${LT_USERNAME}
  LT_ACCESS_KEY: ${LT_ACCESS_KEY}
  TARGET_URL: https://www.americanexpress.com/

runtime:
  language: python
  version: "3.11"

cacheKey: "{{ checksum \"requirements.txt\" }}"
cacheDirectories:
  - .pip_cache

pre:
  - pip install --cache-dir .pip_cache -r requirements.txt

testDiscovery:
  type: raw
  mode: static
  command: python3 -c "tests=['test_sc_001_navigate_to_credit_cards_and_view_list','test_sc_002_filter_cards_by_category','test_sc_003_click_card_view_details','test_sc_004_card_highlights_visible_without_login','test_sc_005_relevant_results_for_selected_filter'];[print(t) for t in tests]"

testRunnerCommand: pytest tests/selenium/test_credit_cards.py::$test -v --tb=short --html=reports/$test.html --self-contained-html

mergeArtifacts: true
uploadArtefacts:
  - name: selenium-test-reports
    path:
      - reports/

retryOnFailure: true
maxRetries: 2

report: true

post:
  - echo "Tests complete"

globalTimeout: 60
testSuiteTimeout: 45

jobLabel:
  - amex-credit-cards
  - agentic-sdlc
  - selenium-python

captureScreenRecordingForScenarios: true
