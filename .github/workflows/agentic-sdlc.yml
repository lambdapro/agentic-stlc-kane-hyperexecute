name: Pure CI Pipeline

on:
  push:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "hyperexecute.yaml"
      - ".hyperexecuteignore"
      - ".github/workflows/agentic-sdlc.yml"
  pull_request:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "hyperexecute.yaml"
      - ".hyperexecuteignore"
      - ".github/workflows/agentic-sdlc.yml"
  workflow_dispatch:
    inputs:
      full_run:
        description: Run all active scenarios instead of incremental selection
        required: false
        default: "true"

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  analyze:
    name: Analyze Requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Kane CLI
        run: npm install -g @testmuai/kane-cli

      - name: Run pure CI analyze stage
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/analyze_requirements.py

      - name: Write analyze summary
        if: always()
        run: python ci/write_github_summary.py --stage analyze --run-url "${{ env.RUN_URL }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: |
            requirements/analyzed_requirements.json
            reports/kane_results.json

  manage:
    name: Manage Scenarios
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-requirements
          path: .

      - name: Run pure CI manage stage
        run: python ci/manage_scenarios.py

      - name: Write manage summary
        if: always()
        run: python ci/write_github_summary.py --stage manage --run-url "${{ env.RUN_URL }}"

      - uses: actions/upload-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios/scenarios.json

  generate:
    name: Generate Tests
    needs: manage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Run pure CI generate stage
        run: python ci/generate_tests_from_scenarios.py

      - name: Write generate summary
        if: always()
        run: python ci/write_github_summary.py --stage generate --run-url "${{ env.RUN_URL }}"

      - uses: actions/upload-artifact@v4
        with:
          name: generated-assets
          path: |
            tests/selenium/test_credit_cards.py
            kane/objectives.json
            scenarios/scenarios.json

  select:
    name: Select Tests
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Run pure CI select stage
        env:
          FULL_RUN: ${{ inputs.full_run || 'true' }}
        run: python ci/select_tests.py

      - name: Write select summary
        if: always()
        run: python ci/write_github_summary.py --stage select --run-url "${{ env.RUN_URL }}"

      - uses: actions/upload-artifact@v4
        with:
          name: selection
          path: |
            reports/test_execution_manifest.json
            reports/pytest_selection.txt

  execute:
    name: Execute Selenium On HyperExecute
    needs: select
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: generated-assets
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: selection
          path: reports

      - name: Download HyperExecute CLI
        run: |
          curl -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      - name: Run selected tests on HyperExecute
        id: hyperexecute
        continue-on-error: true
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          ./hyperexecute \
            --user "$LT_USERNAME" \
            --key "$LT_ACCESS_KEY" \
            --config hyperexecute.yaml \
            --download-artifacts \
            --download-artifacts-path reports/hyperexecute-artifacts \
            --download-report \
            --download-logs

      - name: Surface HyperExecute result metadata
        if: always()
        run: |
          if [ -f .hyperexecute/result.json ]; then
            cp .hyperexecute/result.json reports/hyperexecute-result.json
          fi
          find . -name result.json -print

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            reports/
            hyperexecute-cli.log

      - name: Fail job if HyperExecute reported test failures
        if: steps.hyperexecute.outcome == 'failure'
        run: exit 1

      - name: Write execute summary
        if: always()
        run: python ci/write_github_summary.py --stage execute --run-url "${{ env.RUN_URL }}"

  analyze-failures:
    name: Analyze HyperExecute Failures
    needs: execute
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: .

      - name: Build Hype