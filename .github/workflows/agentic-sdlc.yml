name: Agentic SDLC Pipeline

# Triggers: push to requirements/ OR manual dispatch
# Each job runs one pipeline stage from PIPELINE.md via Claude Code.
# The same pattern works in GitLab CI, Jenkins, and Bitbucket unchanged.
# Required secrets: LT_USERNAME, LT_ACCESS_KEY, ANTHROPIC_API_KEY

on:
  push:
    paths:
      - 'requirements/**'
  pull_request:
    paths:
      - 'requirements/**'
  workflow_dispatch:
    inputs:
      full_run:
        description: Run all tests not just changed scenarios
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:

  # Stage 1 - Parse requirements and verify each AC on the live site via Kane CLI
  analyze-requirements:
    name: Stage 1 - Analyze Requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Kane CLI and Claude Code
        run: npm install -g @testmuai/kane-cli @anthropic-ai/claude-code

      - name: Execute ANALYZE_REQUIREMENTS stage
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Execute stage: ANALYZE_REQUIREMENTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements/analyzed_requirements.json

  # Stage 2 - Diff scenarios.json: update changed, add new, deprecate removed
  manage-scenarios:
    name: Stage 2 - Manage Scenarios
    needs: analyze-requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-requirements
          path: requirements/

      - name: Execute MANAGE_SCENARIOS stage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Execute stage: MANAGE_SCENARIOS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scenarios
          path: scenarios/scenarios.json

  # Stage 3 - Write/update Selenium Python tests for new and changed scenarios
  generate-tests:
    name: Stage 3 - Generate Tests
    needs: manage-scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: scenarios
          path: scenarios/

      - name: Execute GENERATE_TESTS stage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Execute stage: GENERATE_TESTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-suite
          path: |
            tests/
            kane/objectives.json

  # Stage 4 - Select tests then execute in parallel on HyperExecute cloud
  execute-tests:
    name: Stage 4 - Execute Tests on HyperExecute
    needs: generate-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: test-suite
          path: .

      - name: Execute SELECT_TESTS stage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FULL_RUN: ${{ inputs.full_run || 'false' }}
        run: |
          claude -p "Execute stage: SELECT_TESTS from PIPELINE.md"

      - name: Download HyperExecute CLI
        run: |
          curl -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      - name: Run tests on HyperExecute
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          ./hyperexecute --user $LT_USERNAME --key $LT_ACCESS_KEY --config hyperexecute.yaml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports/

  # Stage 5 - Build traceability matrix and produce QA release recommendation
  traceability-and-recommendation:
    name: Stage 5 - Traceability and Release Recommendation
    needs: execute-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-requirements
          path: requirements/

      - uses: actions/download-artifact@v4
        with:
          name: scenarios
          path: scenarios/

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports/

      - name: Execute TRACEABILITY_REPORT stage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Execute stage: TRACEABILITY_REPORT from PIPELINE.md"

      - name: Execute RELEASE_RECOMMENDATION stage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Execute stage: RELEASE_RECOMMENDATION from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-reports
          path: |
            reports/traceability_matrix.md
            reports/release_recommendation.md

      - name: Print release recommendation
        if: always()
        run: cat reports/release_recommendation.md 2>/dev/null || echo "Report not generated"
