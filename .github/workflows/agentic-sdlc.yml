name: Pure CI Pipeline

on:
  push:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "hyperexecute.yaml"
      - ".github/workflows/agentic-sdlc.yml"
  pull_request:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "hyperexecute.yaml"
      - ".github/workflows/agentic-sdlc.yml"
  workflow_dispatch:
    inputs:
      full_run:
        description: Run all active scenarios instead of incremental selection
        required: false
        default: "true"

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:

  analyze:
    name: Stage 1 - Analyze Requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Kane CLI
        run: npm install -g @testmuai/kane-cli

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run analyze stage
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/analyze_requirements.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements/analyzed_requirements.json

  manage:
    name: Stage 2 - Manage Scenarios
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-requirements
          path: requirements

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run manage stage
        run: python ci/manage_scenarios.py

      - uses: actions/upload-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios/scenarios.json

  generate:
    name: Stage 3 - Generate Tests
    needs: manage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run generate stage
        run: python ci/generate_tests_from_scenarios.py

      - uses: actions/upload-artifact@v4
        with:
          name: generated-assets
          path: |
            tests/
            kane/objectives.json
            scenarios/scenarios.json

  select:
    name: Stage 4a - Select Tests
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run select stage
        env:
          FULL_RUN: ${{ inputs.full_run || 'true' }}
        run: python ci/select_tests.py

      - uses: actions/upload-artifact@v4
        with:
          name: selection
          path: |
            reports/test_execution_manifest.json
            reports/pytest_selection.txt

  execute:
    name: Stage 4b - Execute on HyperExecute
    needs: select
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: generated-assets
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: selection
          path: reports

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download HyperExecute CLI
        run: |
          curl -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      - name: Run tests on HyperExecute
        id: hyperexecute
        continue-on-error: true
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          ./hyperexecute \
            --user "$LT_USERNAME" \
            --key "$LT_ACCESS_KEY" \
            --config hyperexecute.yaml 2>&1 | tee hyperexecute-cli.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            reports/
            hyperexecute-cli.log

      - name: Fail if HyperExecute tests failed
        if: steps.hyperexecute.outcome == 'failure'
        run: exit 1

  analyze-failures:
    name: Stage 4c - Analyze HyperExecute Failures
    needs: execute
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports

      - name: Move CLI log to expected location
        run: mv reports/hyperexecute-cli.log hyperexecute-cli.log 2>/dev/null || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Analyze HyperExecute failures
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/analyze_hyperexecute_failures.py

      - name: Print failure analysis
        if: always()
        run: cat reports/hyperexecute_failure_analysis.md 2>/dev/null || echo "No failure analysis generated"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failure-analysis
          path: reports/hyperexecute_failure_analysis.md

  report:
    name: Stage 5 - Traceability and Release Recommendation
    needs: analyze-failures
    if: always()
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: managed-scenarios
          path: scenarios

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: failure-analysis
          path: reports

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build traceability matrix
        run: python ci/build_traceability.py

      - name: Generate release recommendation
        run: python ci/release_recommendation.py

      - name: Print release recommendation
        if: always()
        run: |
          cat reports/release_recommendation.md 2>/dev/null || echo "Release report not generated"
          cat reports/hyperexecute_failure_analysis.md 2>/dev/null || echo "Failure analysis not generated"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-reports
          path: |
            reports/traceability_matrix.md
            reports/release_recommendation.md
            reports/hyperexecute_failure_analysis.md
