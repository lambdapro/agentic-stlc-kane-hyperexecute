name: Agentic STLC (Claude Code + Local Gemma via LiteLLM)

on:
  workflow_dispatch:
    inputs:
      full_run:
        description: Run all active scenarios (true) or only changed (false)
        required: false
        default: "true"
  push:
    paths:
      - "requirements/**"
      - "PIPELINE.md"
      - ".github/workflows/agentic-stlc-claude.yml"

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"
  ANTHROPIC_BASE_URL: "http://localhost:4000"
  ANTHROPIC_API_KEY: "sk-local"
  CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
  CLAUDE_MODEL: "claude-3-haiku-20240307"
  OLLAMA_MODEL: "llama3.2:3b"
  # Cache key — bump the suffix to force a fresh pull when changing models
  OLLAMA_CACHE_KEY: "ollama-llama3.2-3b-v1"

jobs:

  # ── Stage 1 ───────────────────────────────────────────────────────────────
  analyze:
    name: Stage 1 - Analyze Requirements (Claude Agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Kane CLI
        run: npm install -g @testmuai/kane-cli

      - name: Install Kane CLI skill for AI agents
        run: |
          mkdir -p ~/.claude/skills/kane-cli
          if [ -f ".claude/skills/kane-cli/SKILL.md" ]; then
            cp .claude/skills/kane-cli/SKILL.md ~/.claude/skills/kane-cli/SKILL.md
            echo "Kane CLI skill loaded from repo ($(wc -l < ~/.claude/skills/kane-cli/SKILL.md) lines)"
          else
            curl -fsSL -o ~/.claude/skills/kane-cli/SKILL.md \
              https://raw.githubusercontent.com/LambdaTest/kane-cli/main/skills/claude/SKILL.md \
              || echo "Warning: could not download skill"
          fi

      - name: Authenticate Kane CLI
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          kane-cli login --username "$LT_USERNAME" --access-key "$LT_ACCESS_KEY"
          kane-cli whoami

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Ollama model cache (skips pull on warm cache) ──────────────────────
      - uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama
          key: ${{ env.OLLAMA_CACHE_KEY }}

      # ── LiteLLM pip cache ──────────────────────────────────────────────────
      - uses: actions/cache@v4
        id: litellm-cache
        with:
          path: ~/.cache/pip/litellm
          key: litellm-proxy-v1

      - name: Setup Local LLM (Ollama + Gemma + LiteLLM proxy)
        run: |
          # Install Ollama binary (fast — just a binary download)
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

          # Pull model only on cache miss; restore skips this entirely
          if [ "${{ steps.ollama-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss — pulling ${{ env.OLLAMA_MODEL }}..."
            ollama pull ${{ env.OLLAMA_MODEL }}
          else
            echo "Cache hit — model already present, skipping pull"
            ollama list
          fi

          # Create named alias with 128k context window
          printf 'FROM ${{ env.OLLAMA_MODEL }}\nPARAMETER num_ctx 128000\n' > /tmp/Modelfile
          ollama create llm-local -f /tmp/Modelfile
          echo "Gemma model ready: $(ollama list | grep gemma)"

          # Install LiteLLM (uses pip cache if available)
          pip install 'litellm[proxy]'

          # LiteLLM config: maps claude-3-haiku-20240307 → llm-local on Ollama
          cat > /tmp/litellm_config.yaml << 'EOF'
          model_list:
            - model_name: claude-3-haiku-20240307
              litellm_params:
                model: ollama_chat/llm-local
                api_base: http://localhost:11434
          EOF

          nohup litellm --config /tmp/litellm_config.yaml --port 4000 > /tmp/litellm.log 2>&1 &
          sleep 8
          echo "LiteLLM status: $(curl -s http://localhost:4000/health | head -c 100 || echo 'starting...')"

      - name: Execute ANALYZE_REQUIREMENTS via Claude Agent (Local Gemma)
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" -p \
            "Execute stage: ANALYZE_REQUIREMENTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements/analyzed_requirements.json

  # ── Stage 2 ───────────────────────────────────────────────────────────────
  manage:
    name: Stage 2 - Manage Scenarios (Claude Agent)
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-requirements
          path: requirements

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama
          key: ${{ env.OLLAMA_CACHE_KEY }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip/litellm
          key: litellm-proxy-v1

      - name: Setup Local LLM (Ollama + Gemma + LiteLLM proxy)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          if [ "${{ steps.ollama-cache.outputs.cache-hit }}" != "true" ]; then
            ollama pull ${{ env.OLLAMA_MODEL }}
          else
            echo "Cache hit — skipping pull"; ollama list
          fi
          printf 'FROM ${{ env.OLLAMA_MODEL }}\nPARAMETER num_ctx 128000\n' > /tmp/Modelfile
          ollama create llm-local -f /tmp/Modelfile
          pip install 'litellm[proxy]'
          cat > /tmp/litellm_config.yaml << 'EOF'
          model_list:
            - model_name: claude-3-haiku-20240307
              litellm_params:
                model: ollama_chat/llm-local
                api_base: http://localhost:11434
          EOF
          nohup litellm --config /tmp/litellm_config.yaml --port 4000 > /tmp/litellm.log 2>&1 &
          sleep 8

      - name: Execute MANAGE_SCENARIOS via Claude Agent (Local Gemma)
        run: |
          claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" -p \
            "Execute stage: MANAGE_SCENARIOS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios/scenarios.json

  # ── Stage 3 ───────────────────────────────────────────────────────────────
  generate:
    name: Stage 3 - Generate Tests (Claude Agent)
    needs: manage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama
          key: ${{ env.OLLAMA_CACHE_KEY }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip/litellm
          key: litellm-proxy-v1

      - name: Setup Local LLM (Ollama + Gemma + LiteLLM proxy)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          if [ "${{ steps.ollama-cache.outputs.cache-hit }}" != "true" ]; then
            ollama pull ${{ env.OLLAMA_MODEL }}
          else
            echo "Cache hit — skipping pull"; ollama list
          fi
          printf 'FROM ${{ env.OLLAMA_MODEL }}\nPARAMETER num_ctx 128000\n' > /tmp/Modelfile
          ollama create llm-local -f /tmp/Modelfile
          pip install 'litellm[proxy]'
          cat > /tmp/litellm_config.yaml << 'EOF'
          model_list:
            - model_name: claude-3-haiku-20240307
              litellm_params:
                model: ollama_chat/llm-local
                api_base: http://localhost:11434
          EOF
          nohup litellm --config /tmp/litellm_config.yaml --port 4000 > /tmp/litellm.log 2>&1 &
          sleep 8

      - name: Execute GENERATE_TESTS via Claude Agent (Local Gemma)
        run: |
          claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" -p \
            "Execute stage: GENERATE_TESTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        with:
          name: generated-assets
          path: |
            tests/
            kane/objectives.json
            scenarios/scenarios.json

  # ── Stage 4a ──────────────────────────────────────────────────────────────
  select:
    name: Stage 4a - Select Tests (Claude Agent)
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama
          key: ${{ env.OLLAMA_CACHE_KEY }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip/litellm
          key: litellm-proxy-v1

      - name: Setup Local LLM (Ollama + Gemma + LiteLLM proxy)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          if [ "${{ steps.ollama-cache.outputs.cache-hit }}" != "true" ]; then
            ollama pull ${{ env.OLLAMA_MODEL }}
          else
            echo "Cache hit — skipping pull"; ollama list
          fi
          printf 'FROM ${{ env.OLLAMA_MODEL }}\nPARAMETER num_ctx 128000\n' > /tmp/Modelfile
          ollama create llm-local -f /tmp/Modelfile
          pip install 'litellm[proxy]'
          cat > /tmp/litellm_config.yaml << 'EOF'
          model_list:
            - model_name: claude-3-haiku-20240307
              litellm_params:
                model: ollama_chat/llm-local
                api_base: http://localhost:11434
          EOF
          nohup litellm --config /tmp/litellm_config.yaml --port 4000 > /tmp/litellm.log 2>&1 &
          sleep 8

      - name: Execute SELECT_TESTS via Claude Agent (Local Gemma)
        env:
          FULL_RUN: ${{ inputs.full_run || 'true' }}
        run: |
          claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" -p \
            "Execute stage: SELECT_TESTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        with:
          name: selection
          path: |
            reports/test_execution_manifest.json
            reports/pytest_selection.txt

  # ── Stage 4b ──────────────────────────────────────────────────────────────
  execute:
    name: Stage 4b - Execute on HyperExecute
    needs: select
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: generated-assets
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: selection
          path: reports

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download HyperExecute CLI
        run: |
          curl -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      - name: Run tests on HyperExecute
        id: hyperexecute
        continue-on-error: true
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          ./hyperexecute \
            --user "$LT_USERNAME" \
            --key "$LT_ACCESS_KEY" \
            --config hyperexecute.yaml 2>&1 | tee hyperexecute-cli.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            reports/
            hyperexecute-cli.log

      - name: Fail if HyperExecute tests failed
        if: steps.hyperexecute.outcome == 'failure'
        run: exit 1

  # ── Stage 4c ──────────────────────────────────────────────────────────────
  analyze-failures:
    name: Stage 4c - Analyze HyperExecute Failures
    needs: execute
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports

      - name: Move CLI log to expected location
        run: mv reports/hyperexecute-cli.log hyperexecute-cli.log 2>/dev/null || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Analyze HyperExecute failures
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/analyze_hyperexecute_failures.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failure-analysis
          path: reports/hyperexecute_failure_analysis.md

  # ── Stage 5 ───────────────────────────────────────────────────────────────
  report:
    name: Stage 5 - Traceability and Release Recommendation (Claude Agent)
    needs: analyze-failures
    if: always()
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: managed-scenarios
          path: scenarios

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: generated-assets
          path: .

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: selection
          path: reports

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: failure-analysis
          path: reports

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        id: ollama-cache
        with:
          path: ~/.ollama
          key: ${{ env.OLLAMA_CACHE_KEY }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip/litellm
          key: litellm-proxy-v1

      - name: Setup Local LLM (Ollama + Gemma + LiteLLM proxy)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          if [ "${{ steps.ollama-cache.outputs.cache-hit }}" != "true" ]; then
            ollama pull ${{ env.OLLAMA_MODEL }}
          else
            echo "Cache hit — skipping pull"; ollama list
          fi
          printf 'FROM ${{ env.OLLAMA_MODEL }}\nPARAMETER num_ctx 128000\n' > /tmp/Modelfile
          ollama create llm-local -f /tmp/Modelfile
          pip install 'litellm[proxy]'
          cat > /tmp/litellm_config.yaml << 'EOF'
          model_list:
            - model_name: claude-3-haiku-20240307
              litellm_params:
                model: ollama_chat/llm-local
                api_base: http://localhost:11434
          EOF
          nohup litellm --config /tmp/litellm_config.yaml --port 4000 > /tmp/litellm.log 2>&1 &
          sleep 8

      - name: Execute TRACEABILITY_REPORT via Claude Agent (Local Gemma)
        run: |
          claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" -p \
            "Execute stage: TRACEABILITY_REPORT from PIPELINE.md"

      - name: Execute RELEASE_RECOMMENDATION via Claude Agent (Local Gemma)
        run: |
          claude --dangerously-skip-permissions --model "$CLAUDE_MODEL" -p \
            "Execute stage: RELEASE_RECOMMENDATION from PIPELINE.md"

      - name: Fetch HyperExecute and Kane AI API details
        if: always()
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/fetch_api_details.py

      - name: Build full pipeline summary
        if: always()
        env:
          RUN_URL: ${{ env.RUN_URL }}
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/write_github_summary.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-reports
          path: |
            reports/traceability_matrix.md
            reports/release_recommendation.md
            reports/hyperexecute_failure_analysis.md
