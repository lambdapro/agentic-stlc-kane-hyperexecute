name: Agentic SDLC (Claude Code + OAuth)

on:
  workflow_dispatch:
    inputs:
      full_run:
        description: Run all active scenarios (true) or only changed (false)
        required: false
        default: "true"
  push:
    paths:
      - "requirements/**"
      - "PIPELINE.md"
      - ".github/workflows/agentic-sdlc-claude.yml"

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:

  # ── Stage 1 ───────────────────────────────────────────────────────────────
  analyze:
    name: Stage 1 - Analyze Requirements (Claude Agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Kane CLI
        run: npm install -g @testmuai/kane-cli

      - name: Install Kane CLI skill for AI agents
        run: |
          mkdir -p ~/.claude/skills/kane-cli
          # Use skill committed to repo; fall back to official URL if missing
          if [ -f ".claude/skills/kane-cli/SKILL.md" ]; then
            cp .claude/skills/kane-cli/SKILL.md ~/.claude/skills/kane-cli/SKILL.md
            echo "Kane CLI skill loaded from repo ($(wc -l < ~/.claude/skills/kane-cli/SKILL.md) lines)"
          else
            curl -fsSL -o ~/.claude/skills/kane-cli/SKILL.md \
              https://raw.githubusercontent.com/LambdaTest/kane-cli/main/skills/claude/SKILL.md \
              || echo "Warning: could not download skill, agent will proceed without it"
          fi

      - name: Authenticate Kane CLI
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          kane-cli login --username "$LT_USERNAME" --access-key "$LT_ACCESS_KEY"
          kane-cli whoami

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Execute ANALYZE_REQUIREMENTS via Claude Agent (OAuth)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          claude --dangerously-skip-permissions -p \
            "Execute stage: ANALYZE_REQUIREMENTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements/analyzed_requirements.json

  # ── Stage 2 ───────────────────────────────────────────────────────────────
  manage:
    name: Stage 2 - Manage Scenarios (Claude Agent)
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-requirements
          path: requirements

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Execute MANAGE_SCENARIOS via Claude Agent (OAuth)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p \
            "Execute stage: MANAGE_SCENARIOS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios/scenarios.json

  # ── Stage 3 ───────────────────────────────────────────────────────────────
  generate:
    name: Stage 3 - Generate Tests (Claude Agent)
    needs: manage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Execute GENERATE_TESTS via Claude Agent (OAuth)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p \
            "Execute stage: GENERATE_TESTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        with:
          name: generated-assets
          path: |
            tests/
            kane/objectives.json
            scenarios/scenarios.json

  # ── Stage 4a ──────────────────────────────────────────────────────────────
  select:
    name: Stage 4a - Select Tests (Claude Agent)
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        with:
          name: managed-scenarios
          path: scenarios

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Execute SELECT_TESTS via Claude Agent (OAuth)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FULL_RUN: ${{ inputs.full_run || 'true' }}
        run: |
          claude --dangerously-skip-permissions -p \
            "Execute stage: SELECT_TESTS from PIPELINE.md"

      - uses: actions/upload-artifact@v4
        with:
          name: selection
          path: |
            reports/test_execution_manifest.json
            reports/pytest_selection.txt

  # ── Stage 4b ──────────────────────────────────────────────────────────────
  execute:
    name: Stage 4b - Execute on HyperExecute
    needs: select
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: generated-assets
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: selection
          path: reports

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download HyperExecute CLI
        run: |
          curl -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      - name: Run tests on HyperExecute
        id: hyperexecute
        continue-on-error: true
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          ./hyperexecute \
            --user "$LT_USERNAME" \
            --key "$LT_ACCESS_KEY" \
            --config hyperexecute.yaml 2>&1 | tee hyperexecute-cli.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            reports/
            hyperexecute-cli.log

      - name: Fail if HyperExecute tests failed
        if: steps.hyperexecute.outcome == 'failure'
        run: exit 1

  # ── Stage 4c ──────────────────────────────────────────────────────────────
  analyze-failures:
    name: Stage 4c - Analyze HyperExecute Failures
    needs: execute
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports

      - name: Move CLI log to expected location
        run: mv reports/hyperexecute-cli.log hyperexecute-cli.log 2>/dev/null || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Analyze HyperExecute failures
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/analyze_hyperexecute_failures.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failure-analysis
          path: reports/hyperexecute_failure_analysis.md

  # ── Stage 5 ───────────────────────────────────────────────────────────────
  report:
    name: Stage 5 - Traceability and Release Recommendation (Claude Agent)
    needs: analyze-failures
    if: always()
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: managed-scenarios
          path: scenarios

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: generated-assets
          path: .

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: selection
          path: reports

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports

      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: failure-analysis
          path: reports

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Execute TRACEABILITY_REPORT via Claude Agent (OAuth)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p \
            "Execute stage: TRACEABILITY_REPORT from PIPELINE.md"

      - name: Execute RELEASE_RECOMMENDATION via Claude Agent (OAuth)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p \
            "Execute stage: RELEASE_RECOMMENDATION from PIPELINE.md"

      - name: Fetch HyperExecute and Kane AI API details
        if: always()
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/fetch_api_details.py

      - name: Build full pipeline summary
        if: always()
        env:
          RUN_URL: ${{ env.RUN_URL }}
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/write_github_summary.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-reports
          path: |
            reports/traceability_matrix.md
            reports/release_recommendation.md
            reports/hyperexecute_failure_analysis.md
