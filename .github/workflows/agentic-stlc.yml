name: Agentic STLC Pipeline

on:
  push:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "platform/**"
      - "skills/**"
      - "adapters/**"
      - "hyperexecute.yaml"
      - "agentic-stlc.config.yaml"
      - ".github/workflows/agentic-stlc.yml"
      - ".github/actions/**"
  pull_request:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "platform/**"
      - "skills/**"
      - "adapters/**"
      - "hyperexecute.yaml"
      - "agentic-stlc.config.yaml"
  workflow_dispatch:
    inputs:
      full_run:
        description: "Run all active scenarios (not just new/updated)"
        required: false
        default: "true"
        type: boolean
      demo_mode:
        description: "DEMO_MODE: use pre-generated Kane results, skip live Kane calls"
        required: false
        default: "false"
        type: boolean
      target_url:
        description: "Override TARGET_URL for this run"
        required: false
        default: ""
        type: string

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:

  # ── Stage 1: KaneAI Functional Verification ───────────────────────────────
  # Uses the reusable composite action: .github/actions/analyze
  analyze:
    name: "Stage 1 · KaneAI Verification"
    runs-on: ubuntu-latest
    outputs:
      requirements-count: ${{ steps.analyze.outputs.requirements_count }}
    steps:
      - uses: actions/checkout@v4

      - name: "Run KaneAI Analysis"
        id: analyze
        uses: ./.github/actions/analyze
        with:
          lt-username:     ${{ secrets.LT_USERNAME }}
          lt-access-key:   ${{ secrets.LT_ACCESS_KEY }}
          node-version:    ${{ env.NODE_VERSION }}
          python-version:  ${{ env.PYTHON_VERSION }}
          demo-mode:       ${{ inputs.demo_mode || 'false' }}
          kane-project-id: "01J2VAWPNBPA21T0BW44JW026X"
          kane-folder-id:  "01KPD0NC5ZXZD9EXB23QCATTG2"

  # ── Stages 2–7: Orchestrator ──────────────────────────────────────────────
  # Uses the reusable composite action: .github/actions/orchestrate
  orchestrate:
    name: "Stages 2–7 · Orchestrator"
    needs: analyze
    runs-on: ubuntu-latest
    outputs:
      verdict:             ${{ steps.orchestrate.outputs.verdict }}
      pass-rate:           ${{ steps.orchestrate.outputs.pass_rate }}
      quality-gates-passed: ${{ steps.orchestrate.outputs.quality_gates_passed }}
    steps:
      - uses: actions/checkout@v4

      - name: "Run Orchestrator"
        id: orchestrate
        uses: ./.github/actions/orchestrate
        with:
          lt-username:    ${{ secrets.LT_USERNAME }}
          lt-access-key:  ${{ secrets.LT_ACCESS_KEY }}
          python-version: ${{ env.PYTHON_VERSION }}
          full-run:       ${{ inputs.full_run || 'true' }}
          target-url:     ${{ inputs.target_url || '' }}
          he-config:      "hyperexecute.yaml"

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: "Pipeline Summary"
    needs: [analyze, orchestrate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "Print final verdict"
        run: |
          echo "## Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Verdict | **${{ needs.orchestrate.outputs.verdict }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Pass rate | ${{ needs.orchestrate.outputs.pass-rate }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality gates | ${{ needs.orchestrate.outputs.quality-gates-passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Requirements analyzed | ${{ needs.analyze.outputs.requirements-count }} |" >> $GITHUB_STEP_SUMMARY
