name: Agentic STLC Pipeline

on:
  push:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "hyperexecute.yaml"
      - ".github/workflows/agentic-stlc.yml"
  pull_request:
    paths:
      - "requirements/**"
      - "scenarios/**"
      - "tests/**"
      - "ci/**"
      - "hyperexecute.yaml"
      - ".github/workflows/agentic-stlc.yml"
  workflow_dispatch:
    inputs:
      full_run:
        description: Run all active scenarios instead of incremental selection
        required: false
        default: "true"

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:

  # ── Stage 1: Kane AI verifies each acceptance criterion against the live site ──
  analyze:
    name: Stage 1 · Analyze Requirements (Kane AI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Kane CLI
        run: npm install -g @testmuai/kane-cli

      - name: Configure Kane CLI project and folder
        run: |
          kane-cli config project 01J2VAWPNBPA21T0BW44JW026X
          kane-cli config folder 01KPD0NC5ZXZD9EXB23QCATTG2

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run requirement analysis
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: python ci/analyze_requirements.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analyzed-requirements
          path: requirements/analyzed_requirements.json

  # ── Stages 2-5: Orchestrator manages scenarios, generates tests, runs on
  #    HyperExecute, fetches results via MCP, builds traceability + verdict ──
  orchestrate:
    name: Stages 2-5 · Orchestrator
    needs: analyze
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-requirements
          path: requirements

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download HyperExecute CLI
        run: |
          curl -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      - name: Run Agent (Stages 2-5)
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          FULL_RUN: ${{ inputs.full_run || 'true' }}
        run: python ci/agent.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-reports
          path: |
            reports/
            scenarios/scenarios.json
            tests/selenium/test_products.py
