# ─────────────────────────────────────────────────────────────────────────────
# Agentic STLC Platform — Project Configuration
# Repository: lambdapro/agentic-stlc-kane-hyperexecute
# Application: LambdaTest E-Commerce Playground
# ─────────────────────────────────────────────────────────────────────────────

version: "1.0"

project:
  name: "ecommerce-stlc-demo"
  description: "Agentic STLC demo against LambdaTest ecommerce playground"
  repository: "https://github.com/lambdapro/agentic-stlc-kane-hyperexecute"
  branch: "master"

requirements:
  format: "acceptance_criteria"
  paths:
    - "requirements/search.txt"
    - "requirements/cart.txt"
  output_path: "requirements/analyzed_requirements.json"
  encoding: "utf-8"

scenarios:
  path: "scenarios/scenarios.json"
  id_prefix: "SC"
  id_start: 1

framework:
  type: "playwright"
  language: "python"
  test_dir: "tests/playwright"
  test_file: "tests/playwright/test_powerapps.py"

target:
  url: "https://ecommerce-playground.lambdatest.io/"
  environment: "staging"

execution:
  provider: "hyperexecute"
  mode: "incremental"
  concurrency: 5
  timeout_seconds: 90
  retries: 1
  browsers:
    - chrome
  platforms:
    - windows10

hyperexecute:
  config_file: "hyperexecute.yaml"
  cli_path: "./hyperexecute"
  project: "ecommerce-stlc-demo"
  region: "us"

kaneai:
  enabled: true
  parallel_workers: 5
  timeout_seconds: 120
  project_id: "01J2VAWPNBPA21T0BW44JW026X"
  folder_id: "01KPD0NC5ZXZD9EXB23QCATTG2"

reporting:
  output_dir: "reports"
  formats:
    - json
    - markdown
  github_summary: true
  artifacts:
    - "reports/"
    - "scenarios/scenarios.json"
    - "tests/playwright/test_powerapps.py"

quality_gates:
  min_coverage_pct: 50
  min_pass_rate: 75
  max_flaky: 5
  require_critical_coverage: true
  max_high_risk_uncovered: 999
  min_he_pct: 0
  confidence:
    enabled: true
    gate_severity: "WARNING"

adapters:
  git: "github"
  ci: "github_actions"
  execution: "hyperexecute"
  functional_testing: "kaneai"
  test_framework: "playwright"
